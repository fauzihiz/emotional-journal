openapi: 3.0.0
info:
  title: Emotional Journal API (Next.js PWA)
  version: 1.1.0
  description: API for managing emotional micro-journaling and therapy sessions.
  contact:
    name: Fauzihiz
    url: https://fauzihiz.github.io/

paths:
  /entries:
    get:
      summary: List journal entries for the authenticated user
      parameters:
        - name: start_date
          in: query
          schema:
            type: string
            format: date
          description: Filter entries starting from this date (YYYY-MM-DD)
        - name: end_date
          in: query
          schema:
            type: string
            format: date
          description: Filter entries up to this date (YYYY-MM-DD)
      responses:
        '200':
          description: A list of journal entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Entry'
    
    post:
      summary: Create a new journal entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewEntry'
      responses:
        '201':
          description: Entry created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entry'

  /entries/{id}:
    delete:
      summary: Delete a journal entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Entry deleted successfully

  /release_sessions:
    get:
      summary: List all therapy release sessions for the user
      responses:
        '200':
          description: A list of release sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReleaseSession'
    post:
      summary: Log a completed release session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewReleaseSession'
      responses:
        '201':
          description: Session logged successfully

  /activation_codes:
    patch:
      summary: Claim an activation code
      description: Marks a license code as used by the current user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                is_used:
                  type: boolean
                  example: true
                used_by_user_id:
                  type: string
                  format: uuid
                used_at:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Code successfully claimed

components:
  schemas:
    Entry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        emotion_id:
          type: integer
          example: 8
        content:
          type: string
          nullable: true
          example: "Feeling very productive today!"
        entry_date:
          type: string
          format: date
          example: "2026-04-20"
        created_at:
          type: string
          format: date-time
    
    NewEntry:
      type: object
      required:
        - emotion_id
        - entry_date
      properties:
        emotion_id:
          type: integer
          minimum: 1
          maximum: 12
          description: "ID of the emotion (1-12)"
        content:
          type: string
          maxLength: 2000
          nullable: true
        entry_date:
          type: string
          format: date
          example: "2026-04-20"

    ReleaseSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        emotion_id:
          type: integer
        released_text:
          type: string
          nullable: true
        before_score:
          type: integer
        after_score:
          type: integer
        duration:
          type: integer
          description: "Duration in seconds"
        created_at:
          type: string
          format: date-time

    NewReleaseSession:
      type: object
      required:
        - emotion_id
        - before_score
        - after_score
        - duration
      properties:
        emotion_id:
          type: integer
        released_text:
          type: string
          nullable: true
        before_score:
          type: integer
        after_score:
          type: integer
        duration:
          type: integer

    ActivationCode:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: "EJ-X9K2P"
        is_used:
          type: boolean
        used_by_user_id:
          type: string
          format: uuid
        used_at:
          type: string
          format: date-time