openapi: 3.0.0
info:
  title: Emotional Journal API
  version: 1.0.0
  description: API for managing emotional micro-journaling entries.

paths:
  /entries:
    get:
      summary: List all journal entries for the authenticated user
      parameters:
        - name: start_date
          in: query
          schema: { type: string, format: date
}
          description: Filter entries starting from this date (YYYY-MM-DD)
        - name: end_date
          in: query
          schema: { type: string, format: date
}
          description: Filter entries up to this date (YYYY-MM-DD)
      responses:
        '200':
          description: A list of journal entries
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Entry'
}
    
    post:
      summary: Create a new journal entry
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NewEntry'
}
      responses:
        '201':
          description: Entry created successfully
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Entry' }

  /release_sessions:
    get:
      summary: List all therapy release sessions for the user
      responses:
        '200':
          description: A list of release sessions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ReleaseSession' }

  /activation_codes:
    patch:
      summary: Claim an activation code by a user
      requestBody:
        description: The code to claim
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                is_used: { type: boolean, example: true }
                used_by_user_id: { type: string, format: uuid }
                used_at: { type: string, format: date-time }
      responses:
        '200':
          description: Code successfully claimed

components:
  schemas:
    Entry:
      type: object
      properties:
        id: { type: string, format: uuid
}
        emotion_id: { type: integer, example: 5
}
        content: { type: string, example: "Feeling great today!"
}
        entry_date: { type: string, format: date, example: "2026-04-01"
}
        created_at: { type: string, format: date-time
}
    
    NewEntry:
      type: object
      required: [emotion_id
]
      properties:
        emotion_id: { type: integer, minimum: 1, maximum: 5
}
        content: { type: string, maxLength: 1000
}
        entry_date: { type: string, format: date, description: "Defaults to today if null"
}

    ReleaseSession:
      type: object
      properties:
        id: { type: string, format: uuid }
        emotion_id: { type: integer, example: 2 }
        released_text: { type: string, example: "Saya memaafkan masa lalu." }
        before_score: { type: integer, example: 2 }
        after_score: { type: integer, example: 8 }
        duration: { type: integer, description: "Duration in seconds", example: 120 }
        created_at: { type: string, format: date-time }

    ActivationCode:
      type: object
      properties:
        id: { type: string, format: uuid }
        code: { type: string, example: "EJ-A9Z2X" }
        is_used: { type: boolean, example: true }
        used_by_user_id: { type: string, format: uuid }
        used_at: { type: string, format: date-time }